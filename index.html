<script>
  // ────────────────────────────────────────────────
  // PAGE ACCESS PASSWORD
  // ────────────────────────────────────────────────
  const PAGE_PASSWORD = "EW123";

  const enteredPagePw = prompt("Enter password to access EW Mod Panel:");

  if (enteredPagePw !== PAGE_PASSWORD) {
    document.getElementById('blocked').style.display = 'flex';
    document.body.innerHTML = document.getElementById('blocked').outerHTML;
    throw new Error("Page access denied");
  }

  // ────────────────────────────────────────────────
  // DELETE PASSWORD
  // ────────────────────────────────────────────────
  const DELETE_PASSWORD = "4221";

  // ────────────────────────────────────────────────
  // REPORT COOLDOWN (1 minute)
  // ────────────────────────────────────────────────
  const COOLDOWN_MS = 60 * 1000; // 1 minute

  // ────────────────────────────────────────────────
  // REST OF THE SCRIPT
  // ────────────────────────────────────────────────
  const supabaseUrl = 'https://ugijazxbscpiwavmkjbr.supabase.co';
  const supabaseKey = 'sb_publishable_tUlhOkObHpTpwlh-9R7x0Q_1kd_q6qe';

  const { createClient } = window.supabase;
  const sb = createClient(supabaseUrl, supabaseKey);

  let allReports = [];

  function showTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');

    document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
    document.querySelector(`nav a[href="#${tabId}"]`).classList.add('active');

    if (tabId === 'view') loadReports();
  }

  async function loadReports() {
    const list = document.getElementById('reports-list');
    const noResults = document.getElementById('no-results');
    list.innerHTML = 'Loading reports...';
    noResults.style.display = 'none';

    const { data, error } = await sb
      .from('reports')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) {
      list.innerHTML = `<p style="color:#f85149; text-align:center;">Error loading reports: ${error.message}</p>`;
      console.error('Load error:', error);
      return;
    }

    allReports = data || [];

    if (allReports.length === 0) {
      list.innerHTML = '<p style="text-align:center; color:#8b949e; font-style:italic;">No reports have been submitted yet.</p>';
      return;
    }

    renderReports(allReports);
  }

  function renderReports(reports) {
    const list = document.getElementById('reports-list');
    const noResults = document.getElementById('no-results');
    list.innerHTML = '';

    if (reports.length === 0) {
      noResults.style.display = 'block';
      return;
    }

    reports.forEach(report => {
      const div = document.createElement('div');
      div.className = 'report-item';
      div.innerHTML = `
        <h3>${report.reported_user || 'Unknown User'}</h3>
        <p><strong>Reason:</strong> ${report.reason || 'N/A'}</p>
        <p><strong>Proposed Punishment:</strong> ${report.punishment || 'None specified'}</p>
        <p><strong>Moderator:</strong> ${report.moderator || 'Unknown'}</p>
        <p><strong>Submitted:</strong> ${new Date(report.created_at).toLocaleString()}</p>
      `;

      if (report.link) {
        div.innerHTML += `<p><strong>Proof Link:</strong> <a href="${report.link}" target="_blank">${report.link}</a></p>`;
      }

      if (report.image_url) {
        div.innerHTML += `<p><strong>Image Proof:</strong><br><img src="${report.image_url}" alt="Proof Image" style="max-width:100%; border-radius:6px; margin-top:10px;"></p>`;
      }

      if (report.video_url) {
        div.innerHTML += `<p><strong>Video Proof:</strong><br><video controls style="max-width:100%; border-radius:6px; margin-top:10px;"><source src="${report.video_url}" type="video/mp4">Your browser does not support video.</video></p>`;
      }

      // Delete button
      const delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.textContent = 'Delete';
      delBtn.onclick = () => deleteReport(report.id);
      div.appendChild(delBtn);

      list.appendChild(div);
    });
  }

  async function deleteReport(id) {
    const enteredPw = prompt("Enter delete password:");
    if (enteredPw !== DELETE_PASSWORD) {
      alert("Incorrect password.");
      return;
    }

    if (!confirm("Are you sure you want to delete this report?")) return;

    const { error } = await sb.from('reports').delete().eq('id', id);

    if (error) {
      alert("Delete failed: " + error.message);
      console.error('Delete error:', error);
    } else {
      alert("Report deleted.");
      loadReports(); // Refresh list
    }
  }

  // Form submission
  document.getElementById('reportForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const status = document.getElementById('status');
    status.textContent = 'Processing...';
    status.style.color = '#e6edf3';

    // Cooldown check
    const lastSubmit = localStorage.getItem('lastSubmitTime');
    if (lastSubmit && Date.now() - parseInt(lastSubmit) < COOLDOWN_MS) {
      status.textContent = 'Please wait 1 minute before submitting again.';
      status.style.color = '#f85149';
      return;
    }

    const reported_user = document.getElementById('reported_user').value.trim();
    const reason = document.getElementById('reason').value.trim();
    const punishment = document.getElementById('punishment').value.trim();
    const moderator = document.getElementById('moderator').value.trim();
    const link = document.getElementById('link').value.trim();
    const imageFile = document.getElementById('image').files[0];
    const videoFile = document.getElementById('video').files[0];

    if (!reported_user || !reason || !moderator) {
      status.textContent = 'Please fill required fields.';
      status.style.color = '#f85149';
      return;
    }

    let imageUrl = null;
    let videoUrl = null;

    try {
      // Upload image if provided
      if (imageFile) {
        const fileExt = imageFile.name.split('.').pop();
        const fileName = `${Date.now()}.${fileExt}`;
        const { data, error } = await sb.storage
          .from('reports-media')
          .upload(fileName, imageFile);

        if (error) throw error;

        imageUrl = sb.storage.from('reports-media').getPublicUrl(fileName).data.publicUrl;
      }

      // Upload video if provided
      if (videoFile) {
        const fileExt = videoFile.name.split('.').pop();
        const fileName = `${Date.now()}.${fileExt}`;
        const { data, error } = await sb.storage
          .from('reports-media')
          .upload(fileName, videoFile);

        if (error) throw error;

        videoUrl = sb.storage.from('reports-media').getPublicUrl(fileName).data.publicUrl;
      }

      // Insert report
      const { error } = await sb
        .from('reports')
        .insert({
          reported_user,
          reason,
          punishment,
          moderator,
          link: link || null,
          image_url: imageUrl,
          video_url: videoUrl
        });

      if (error) throw error;

      status.textContent = 'Report submitted successfully!';
      status.style.color = '#2ea043';

      // Reset form
      document.getElementById('reportForm').reset();

      // Set cooldown
      localStorage.setItem('lastSubmitTime', Date.now());

    } catch (err) {
      status.textContent = 'Error: ' + (err.message || 'Unknown error');
      status.style.color = '#f85149';
      console.error('Submit error:', err);
    }
  });

  // Search functionality
  document.getElementById('searchInput').addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase().trim();

    if (!term) {
      renderReports(allReports);
      document.getElementById('no-results').style.display = 'none';
      return;
    }

    const filtered = allReports.filter(r =>
      (r.reported_user || '').toLowerCase().includes(term) ||
      (r.reason || '').toLowerCase().includes(term) ||
      (r.moderator || '').toLowerCase().includes(term) ||
      (r.punishment || '').toLowerCase().includes(term) ||
      (r.link || '').toLowerCase().includes(term)
    );

    renderReports(filtered);

    if (filtered.length === 0) {
      document.getElementById('no-results').style.display = 'block';
    } else {
      document.getElementById('no-results').style.display = 'none';
    }
  });

  // Initial load on view tab if hash is present
  if (location.hash === '#view') {
    showTab('view');
  }
</script>
